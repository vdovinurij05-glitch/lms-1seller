name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          command_timeout: 10m
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            # Clone repo (remove broken dir if exists)
            if [ -d /var/www/lms-1seller ] && [ ! -d /var/www/lms-1seller/.git ]; then
              echo "Removing broken directory..."
              # Save .env and db if they exist
              [ -f /var/www/lms-1seller/.env ] && cp /var/www/lms-1seller/.env /tmp/lms-env-backup
              [ -f /var/www/lms-1seller/prisma/prod.db ] && cp /var/www/lms-1seller/prisma/prod.db /tmp/lms-db-backup
              rm -rf /var/www/lms-1seller
            fi

            if [ ! -d /var/www/lms-1seller ]; then
              echo "Cloning repository..."
              git clone https://github.com/vdovinurij05-glitch/lms-1seller.git /var/www/lms-1seller
            fi

            cd /var/www/lms-1seller

            # Restore backups if they exist
            [ -f /tmp/lms-env-backup ] && mv /tmp/lms-env-backup .env
            [ -f /tmp/lms-db-backup ] && mkdir -p prisma && mv /tmp/lms-db-backup prisma/prod.db

            # Create .env if missing
            if [ ! -f .env ]; then
              echo "Creating .env file..."
              SECRET=$(openssl rand -hex 32)
              cat > .env <<ENVEOF
            DATABASE_URL="file:./prisma/prod.db"
            NEXTAUTH_SECRET="$SECRET"
            NEXTAUTH_URL="https://learn.1seller.ru"
            ENVEOF
              echo ".env created"
            fi

            echo "Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main
            git clean -fd -e .env -e prisma/prod.db -e prisma/prod.db-journal
            echo "Code synced to: $(git rev-parse --short HEAD)"

            echo "Installing dependencies..."
            npm ci

            echo "Generating Prisma client..."
            npx prisma generate

            echo "Running migrations..."
            npx prisma migrate deploy

            echo "Seeding database..."
            npx tsx prisma/seed.ts || true

            echo "Building application..."
            rm -rf .next
            npm run build

            echo "Restarting application..."
            pm2 delete lms-1seller 2>/dev/null || true
            sleep 2
            fuser -k 3100/tcp 2>/dev/null || true
            sleep 1
            pm2 start ecosystem.config.js
            pm2 save

            echo "Deployment completed!"
            pm2 status
            sleep 3
            curl -s -o /dev/null -w "%{http_code}" http://localhost:3100 || echo "App starting..."

      - name: Setup Nginx
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            # Setup nginx if not configured
            if [ ! -f /etc/nginx/sites-available/learn.1seller.ru ]; then
              echo "Configuring nginx for learn.1seller.ru..."
              cat > /etc/nginx/sites-available/learn.1seller.ru << 'NGINX'
            server {
                listen 80;
                server_name learn.1seller.ru;

                location / {
                    proxy_pass http://127.0.0.1:3100;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_cache_bypass $http_upgrade;
                }
            }
            NGINX
              ln -sf /etc/nginx/sites-available/learn.1seller.ru /etc/nginx/sites-enabled/
              nginx -t && systemctl reload nginx
              echo "Nginx configured!"

              # SSL
              certbot --nginx -d learn.1seller.ru --non-interactive --agree-tos --email admin@1seller.ru || echo "SSL setup skipped (DNS may not be ready)"
            else
              echo "Nginx already configured"
            fi

      - name: Notify status
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "Deployment successful!"
          else
            echo "Deployment failed!"
          fi
